<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | AIXConstruction</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <link
        href="https://assets.calendly.com/assets/external/widget.css"
        rel="stylesheet">

</head>

<body>

<div id="navbar"></div>

<section class="contact-page">

    <div class="site-container">

        <h1 class="contact-title">

            Book a free consultation

        </h1>

        <p class="contact-subtitle">

            A practical conversation to explore AI opportunities
            for your construction business.

        </p>

        <div class="contact-layout">

            <!-- LEFT COLUMN -->

            <div class="calendly-column">

                <div
                    class="calendly-inline-widget"
                    data-url="https://calendly.com/igpemabus/30min"
                    style="min-width:320px;height:580px;">

                </div>

            </div>

            <!-- RIGHT COLUMN -->

            <div class="contact-image-column">

                <img
                    src="images/business-ai-powered.png"
                    alt="AI Construction"
                    class="contact-page-image">

                <div class="contact-message">

                    <p>

                        Will your future clients expect AI-enabled services?

                    </p>

                    <p>

                        Let's make sure you're ahead of the curve.

                    </p>

                    <p class="lets-do-it">

                        Let's do it together.

                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

<div id="footer"></div>

<script
    src="https://assets.calendly.com/assets/external/widget.js"
    async>
</script>

<script src="js/main.js"></script>

</body>

</html>
