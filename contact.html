<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | AIXConstruction</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- NAVBAR -->

    <header class="navbar">

        <div class="navbar-left">

            <a href="index.html">
                <img
                    src="images/logo-aixconstruction.png"
                    alt="AIXConstruction"
                    class="logo">
            </a>

        </div>

        <div class="navbar-center">

            <div class="language-switcher">

                <button class="lang active">EN</button>
                <button class="lang">DE</button>
                <button class="lang">ES</button>

            </div>

        </div>

        <div class="navbar-right">

            <nav>

                <a href="index.html#services">
                    Services
                </a>

                <a href="index.html#roadmap">
                    Our Roadmap
                </a>

            </nav>

            <a href="contact.html" class="contact-btn">
                Contact
            </a>

        </div>

    </header>

    <!-- CONTACT PAGE -->

    <section class="contact-page">

        <h1 class="contact-title">

            Book a free consultation

        </h1>

        <p class="contact-subtitle">

            A practical conversation to explore AI opportunities
            for your construction business.

        </p>

        <div class="contact-layout">

            <!-- LEFT COLUMN -->

            <div class="calendly-column">

                <div
                    class="calendly-inline-widget"
                    data-url="https://calendly.com/igpemabus/30min"
                    style="min-width:320px;height:700px;">

                </div>

            </div>

            <!-- RIGHT COLUMN -->

            <div class="contact-image-column">

                <img
                    src="images/business-ai-powered.png"
                    alt="AI Construction"
                    class="contact-image">

                <div class="contact-message">

                    <p>

                        Will your future clients expect anything else,
                        but that you use <span>AI</span> to continue
                        providing good services?

                    </p>

                    <p class="lets-do-it">

                        Let's do it together.

                    </p>

                </div>

            </div>

        </div>

    </section>

    <!-- CALENDLY -->

    <script
        src="https://assets.calendly.com/assets/external/widget.js"
        async>
    </script>

    <!-- LANGUAGE BUTTONS -->

    <script>

        document.querySelectorAll('.lang').forEach(button => {

            button.addEventListener('click', () => {

                document.querySelectorAll('.lang')
                    .forEach(b => b.classList.remove('active'));

                button.classList.add('active');

            });

        });

    </script>

</body>

</html>
